# /etc/nginx/sites-available/iotradio
#
# 이 파일을 sites-available에 두고 sites-enabled로 심볼릭 링크한 뒤,
# certbot --nginx 로 인증서를 발급하면 certbot이 443/SSL 블록을 자동 구성한다.
# <도메인>은 실제 도메인으로 바꾼다.
#
# 경로 역할 요약:
#   /                        → web/ 정적 서빙 (웹 UI, Python 미개입)
#   /files/                  → media/uploads/ 정적 서빙 (단말 파일 다운로드)
#   /cmd /audio /ingest      → Python WSS 프록시
#   /upload /broadcast /api/ → Python HTTP 프록시

upstream iotradio_py {
    server 127.0.0.1:8080;
    keepalive 16;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS 리다이렉트 ──────────────────────────────────
server {
    listen 80;
    server_name <도메인> www.<도메인>;
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 메인 서버 ──────────────────────────────────────────
server {
    listen 443 ssl;
    server_name <도메인> www.<도메인>;

    # certbot이 자동으로 채운다.
    # ssl_certificate     /etc/letsencrypt/live/<도메인>/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/<도메인>/privkey.pem;

    client_max_body_size 8m;
    tcp_nodelay on;

    # ── 웹 UI (gunpo-broadcaster 빌드 결과물) ─────────────────
    # npm run build → dist/ → 서버 /opt/iotradio/web/ 에 배포
    # /cmd, /audio 등 API 경로보다 아래에 있으면 안 되므로 맨 마지막에 위치.
    root /opt/iotradio/web;
    index index.html;

    # ── MP3 파일 다운로드 (단말 전용, Python 미개입) ─────────
    location /files/ {
        alias /opt/iotradio/media/uploads/;
        autoindex off;
    }

    # ── WSS: 제어 채널 (/cmd) ────────────────────────────────
    location /cmd {
        proxy_pass http://iotradio_py;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── WSS: 오디오 팬아웃 (/audio) ──────────────────────────
    location /audio {
        proxy_pass http://iotradio_py;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── WSS: 군포 앱 인제스트 (/ingest) ──────────────────────
    location /ingest {
        proxy_pass http://iotradio_py;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── HTTP: 업로드 / 방송 트리거 / 인증 / 상태 ─────────────
    location ~ ^/(upload|broadcast|api)(/|$) {
        # [선택] 군포 PC 고정 IP만 허용. 유동 IP면 주석 처리.
        # allow <군포_고정_IP>;
        # deny all;

        proxy_pass http://iotradio_py;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
    }

    # ── SPA 폴백: /로 시작하는 나머지 요청 → index.html ──────
    # React Router 쓸 경우를 위해. 현재 구조상 단일 페이지라 사실상 동일.
    location / {
        try_files $uri $uri/ /index.html;
    }
}